name: HybridSOC CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Security Scan ─────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

  # ── Build & Test AI Engine ────────────────────────────────────────
  build-ai-engine:
    name: Build AI Engine
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r services/ai-engine/requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: |
          if [ -d "services/ai-engine/tests/" ]; then
            pytest services/ai-engine/tests/ -v --tb=short
          else
            echo "No tests found, skipping..."
          fi

      - name: Build Docker image
        run: docker build -t hybridsoc/ai-engine:${{ github.sha }} ./services/ai-engine

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hybridsoc/ai-engine:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

  # ── Build & Test GRC Engine ───────────────────────────────────────
  build-grc-engine:
    name: Build GRC Engine
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hybridsoc/grc-engine:${{ github.sha }} ./services/grc-engine

  # ── Build API Gateway ─────────────────────────────────────────────
  build-api-gateway:
    name: Build API Gateway
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hybridsoc/api-gateway:${{ github.sha }} ./services/api-gateway

  # ── Push to Registry (main branch only) ──────────────────────────
  push-images:
    name: Push Images
    runs-on: ubuntu-latest
    needs: [build-ai-engine, build-grc-engine, build-api-gateway]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AI Engine
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-engine
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ai-engine:latest
            ghcr.io/${{ github.repository }}/ai-engine:2.0.0

      - name: Build and push GRC Engine
        uses: docker/build-push-action@v5
        with:
          context: ./services/grc-engine
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/grc-engine:latest
            ghcr.io/${{ github.repository }}/grc-engine:2.0.0

  # ── Deploy via ArgoCD (main branch only) ─────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: push-images
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger ArgoCD sync
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" \
            https://argocd.hybridsoc.ai/api/v1/applications/hybridsoc/sync
