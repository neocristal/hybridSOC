name: API Discovery Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      api-endpoint:
        description: "API discovery endpoint URL (overrides secret if provided)"
        required: false
        type: string
      api-token:
        description: "API discovery token (overrides secret if provided)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  api-discovery:
    name: Run API discovery action
    runs-on: ubuntu-latest
    env:
      # Configure these in repository settings -> Secrets and variables -> Actions
      # - API_DISCOVERY_ENDPOINT
      # - API_DISCOVERY_TOKEN
      API_ENDPOINT: ${{ inputs['api-endpoint'] || secrets.API_DISCOVERY_ENDPOINT }}
      API_TOKEN: ${{ inputs['api-token'] || secrets.API_DISCOVERY_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve API discovery configuration
        id: config
        env:
          INPUT_ENDPOINT: ${{ github.event.inputs['api-endpoint'] }}
          INPUT_TOKEN: ${{ github.event.inputs['api-token'] }}
          SECRET_ENDPOINT: ${{ secrets.API_DISCOVERY_ENDPOINT }}
          SECRET_TOKEN: ${{ secrets.API_DISCOVERY_TOKEN }}
        run: |
          API_ENDPOINT="${INPUT_ENDPOINT:-$SECRET_ENDPOINT}"
          API_TOKEN="${INPUT_TOKEN:-$SECRET_TOKEN}"

          if [ -z "$API_ENDPOINT" ] || [ -z "$API_TOKEN" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "api_endpoint=" >> "$GITHUB_OUTPUT"
            echo "api_token=" >> "$GITHUB_OUTPUT"
            echo "Skipping API discovery scan: missing endpoint/token configuration."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "api_endpoint=$API_ENDPOINT" >> "$GITHUB_OUTPUT"
            echo "api_token=$API_TOKEN" >> "$GITHUB_OUTPUT"
          fi

      - name: API discovery action
        if: steps.config.outputs.should_run == 'true'
        uses: apisec-inc/apisec-run-scan@025432089674a28ba8fb55f8ab06c10215e772ea
        with:
          apisec-username: ${{ secrets.apisec_username }}
          apisec-password: ${{ secrets.apisec_password }}
          apisec-project: "VAmPI"
          sarif-result-file: "apisec-results.sarif"
          api-endpoint: ${{ steps.config.outputs.api_endpoint }}
          api-token: ${{ steps.config.outputs.api_token }}

      - name: Upload SARIF report
        if: steps.config.outputs.should_run == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./apisec-results.sarif

      - name: Add workflow summary
        run: |
          {
            echo "## API Discovery Scan";
            echo "- Trigger: \`${{ github.event_name }}\`";
            echo "- Config present: \`${{ steps.config.outputs.should_run }}\`";
            if [ "${{ steps.config.outputs.should_run }}" = "true" ]; then
              echo "- Endpoint: \`${{ steps.config.outputs.api_endpoint }}\`";
              echo "- Result: SARIF uploaded";
            else
              echo "- Result: skipped (set API_DISCOVERY_ENDPOINT and API_DISCOVERY_TOKEN secrets or provide workflow inputs).";
            fi
          } >> "$GITHUB_STEP_SUMMARY"
