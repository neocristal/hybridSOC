apiVersion: apps/v1
kind: Deployment
metadata:
  name: grc-engine
  namespace: hybridsoc
  labels:
    app: grc-engine
    component: compliance
    version: "2.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: grc-engine
  template:
    metadata:
      labels:
        app: grc-engine
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grc-engine
          image: hybridsoc/grc-engine:2.0.0
          ports:
            - containerPort: 8001
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - mountPath: /tmp
              name: tmp-volume
      volumes:
        - name: tmp-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grc-engine
  namespace: hybridsoc
spec:
  selector:
    app: grc-engine
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
