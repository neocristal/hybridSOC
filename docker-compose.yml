version: "3.9"

# HybridSOC Full Enterprise Stack
# Start: docker compose up -d
# Requires: .env file (copy from .env.example)

services:

  # ── Kafka Streaming Backbone ───────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [hybridsoc]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [hybridsoc]

  # ── SIEM: Wazuh ───────────────────────────────────────────────────
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.7.2
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
    networks: [hybridsoc]

  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.2
    restart: unless-stopped
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      INDEXER_URL: https://wazuh-indexer:9200
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD}
    volumes:
      - wazuh-manager-data:/var/ossec/data
    networks: [hybridsoc]

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7.2
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD}
      WAZUH_API_URL: https://wazuh-manager
    depends_on: [wazuh-manager, wazuh-indexer]
    networks: [hybridsoc]

  # ── SOAR: TheHive + Cortex ────────────────────────────────────────
  thehive:
    image: strangebee/thehive:5.3
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - TH_SECRET=${THEHIVE_SECRET}
    volumes:
      - thehive-data:/opt/thp/thehive/data
    networks: [hybridsoc]

  cortex:
    image: thehiveproject/cortex:3.1.7
    restart: unless-stopped
    ports:
      - "9001:9001"
    environment:
      - SECRET=${CORTEX_SECRET}
    volumes:
      - cortex-data:/var/db/cortex
    networks: [hybridsoc]

  # ── Threat Intelligence ───────────────────────────────────────────
  misp:
    image: ghcr.io/misp/misp-docker/misp-core:latest
    restart: unless-stopped
    ports:
      - "8443:443"
    environment:
      MISP_ADMIN_EMAIL: admin@hybridsoc.local
      MISP_ADMIN_PASSPHRASE: ${MISP_ADMIN_PASSWORD}
    networks: [hybridsoc]

  # ── IAM: Keycloak ─────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    command: start-dev
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - keycloak-data:/opt/keycloak/data
    networks: [hybridsoc]

  # ── PAM: HashiCorp Vault ──────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.16
    restart: unless-stopped
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    networks: [hybridsoc]

  # ── HybridSOC AI Engine ───────────────────────────────────────────
  ai-engine:
    build: ../services/ai-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /models/isolation_forest_v2.1.0.pkl
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    networks: [hybridsoc]

  # ── HybridSOC GRC Engine ──────────────────────────────────────────
  grc-engine:
    build: ../services/grc-engine
    restart: unless-stopped
    ports:
      - "8001:8001"
    security_opt:
      - no-new-privileges:true
    networks: [hybridsoc]

  # ── HybridSOC API Gateway ─────────────────────────────────────────
  api-gateway:
    build: ../services/api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on: [ai-engine, grc-engine]
    networks: [hybridsoc]

networks:
  hybridsoc:
    driver: bridge

volumes:
  wazuh-indexer-data:
  wazuh-manager-data:
  thehive-data:
  cortex-data:
  keycloak-data:
